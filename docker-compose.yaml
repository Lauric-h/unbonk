services:
  postgres:
    image: postgres:16-alpine
    container_name: unbonk-postgres
    environment:
      POSTGRES_USER: unbonk_user
      POSTGRES_PASSWORD: unbonk_pass
      POSTGRES_DB: unbonk-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unbonk_user -d unbonk-dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
